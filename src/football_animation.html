</div>

            settings
        </button>
</header>

<main class="pt-20 px-container-padding-mobile flex flex-col gap-gutter">

<div class="flex justify-between items-center w-full">
<div class="glass-card px-4 py-2 rounded-full flex items-center gap-2 border border-white/10">
<span class="font-label-caps text-label-caps text-on-surface-variant">STREAK:</span>
<span class="font-stat-value text-[20px] text-secondary-fixed">5</span>
</div>
<div class="glass-card px-4 py-2 rounded-full flex items-center gap-2 border border-white/10">
<span class="font-label-caps text-label-caps text-on-surface-variant">ACCURACY:</span>
<span class="font-stat-value text-[20px] text-tertiary">88%</span>
</div>
</div>
<!-- Pitch Area Widget -->
<div class="glass-card rounded-xl overflow-hidden relative min-h-[450px] flex flex-col items-center justify-end p-6">
<!-- Pitch Surface -->
<div class="absolute inset-0 z-0 bg-gradient-to-b from-primary-container/20 to-primary-container/60">
<div class="pitch-perspective w-full h-full">
<div class="pitch-surface w-full h-[150%] absolute -bottom-1/4 bg-[#062c12] border-t-2 border-white/20">
<!-- Grass Pattern/Texture -->
<div class="w-full h-full opacity-20" style="background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.05) 40px, rgba(255,255,255,0.05) 80px);"></div>
<!-- Penalty Arc and Spot -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-24 border-2 border-white/20 rounded-full"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-2 h-2 bg-white/40 rounded-full shadow-lg"></div>
</div>
</div>
</div>
<!-- Goal Post & Targets -->
<div class="relative z-10 w-full aspect-video border-x-4 border-t-4 border-secondary/80 rounded-t-lg mb-12 flex flex-col justify-between">

<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 10px 10px;"></div>
<!-- Target Zones -->
<div class="grid grid-cols-3 grid-rows-2 h-full w-full p-2 gap-2">

<div class="w-2 h-2 bg-tertiary rounded-full"></div>
</div>
</div>
<div></div> <!-- Center Gap -->
<!-- Top Right Target (Active/Flying Toward) -->
<div class="border-2 border-tertiary rounded bg-tertiary/20 flex items-center justify-center neon-glow-cyan animate-pulse">
<div class="w-10 h-10 rounded-full border-4 border-tertiary flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">target</span>
</div>
</div>
<div></div>

<div class="flex items-end justify-center pb-2">

</div>
</div>
<div></div>
</div>
</div>

<defs>
<lineargradient id="gradient-cyan" x1="0%" x2="100%" y1="100%" y2="0%">
<stop offset="0%" style="stop-color:rgba(0,219,231,0)"></stop>
<stop offset="100%" style="stop-color:rgba(0,219,231,1)"></stop>
</lineargradient>
</defs>
</svg>

                KICK
